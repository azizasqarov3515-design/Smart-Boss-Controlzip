kind = "mobile"
previewPath = "/"
title = "SMARTBOSScontrol"
version = "1.0.0"
id = "artifacts/smartboss"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 23043

[services.development]
run = "pnpm --filter @workspace/smartboss run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smartboss", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/smartboss", "run", "serve" ]

[services.env]
PORT = "23043"
BASE_PATH = "/"
