<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1.00001,viewport-fit=cover"
    />

    <!-- PWA / Android full-screen -->
    <meta name="theme-color" content="#1565C0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SMARTBOSScontrol" />
    <meta name="application-name" content="SMARTBOSScontrol" />
    <meta name="msapplication-TileColor" content="#1565C0" />
    <meta name="description" content="Android mobil aksessuarlar do'koni boshqaruv tizimi" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/assets/images/icon.png" />
    <link rel="icon" type="image/png" href="/assets/images/icon.png" />

    <title>SMARTBOSScontrol</title>

    <style>
      /* Full-screen base reset */
      *, *::before, *::after { box-sizing: border-box; }
      html {
        height: 100%;
        background-color: #F4F6FB;
        -webkit-text-size-adjust: 100%;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background-color: #F4F6FB;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root {
        height: 100%;
        display: flex;
        flex-direction: column;
      }
      /* Prevent pull-to-refresh on mobile browsers */
      body { overscroll-behavior: none; }

      /* Splash loader before React mounts */
      #splash {
        position: fixed;
        inset: 0;
        background: #F4F6FB;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 16px;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }
      #splash-logo {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        background: #1565C0;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 8px 24px rgba(21,101,192,0.35);
      }
      #splash-text {
        font-size: 18px;
        font-weight: 700;
        color: #1A1A2E;
        letter-spacing: 0.5px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      #splash-spinner {
        width: 28px;
        height: 28px;
        border: 3px solid rgba(21,101,192,0.2);
        border-top-color: #1565C0;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
    </style>
  </head>
  <body>
    <!-- Splash screen shown while React/Expo loads -->
    <div id="splash">
      <div id="splash-logo">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="8" width="32" height="24" rx="3" stroke="white" stroke-width="2.5" fill="none"/>
          <rect x="8" y="28" width="24" height="3" rx="1.5" fill="white"/>
          <rect x="14" y="31" width="12" height="2" rx="1" fill="white"/>
          <rect x="8" y="12" width="10" height="8" rx="1.5" fill="white" opacity="0.9"/>
          <rect x="22" y="12" width="10" height="3" rx="1.5" fill="white" opacity="0.7"/>
          <rect x="22" y="17" width="7" height="3" rx="1.5" fill="white" opacity="0.7"/>
        </svg>
      </div>
      <div id="splash-text">SMARTBOSScontrol</div>
      <div id="splash-spinner"></div>
    </div>

    <div id="root"></div>

    <script>
      // Hide splash when React has mounted
      window.__hideSplash = function() {
        var splash = document.getElementById('splash');
        if (splash) {
          splash.classList.add('hidden');
          setTimeout(function() { splash.remove(); }, 400);
        }
      };
      // Auto-hide splash after max 6 seconds as fallback
      setTimeout(window.__hideSplash, 6000);
    </script>
  </body>
</html>
