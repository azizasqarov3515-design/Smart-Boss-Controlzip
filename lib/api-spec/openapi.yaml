openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification for SMARTBOSScontrol
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: products
  - name: dashboard
  - name: sales
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /products:
    get:
      operationId: getProducts
      tags: [products]
      summary: Get all products
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProduct"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
  /products/{id}:
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProduct"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Dashboard statistics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"
  /sales:
    get:
      operationId: getSales
      tags: [sales]
      summary: Get all sales (transaction history)
      responses:
        "200":
          description: List of sales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SaleWithItems"
    post:
      operationId: createSale
      tags: [sales]
      summary: Create a sale (checkout cart, decrement stock)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSale"
      responses:
        "201":
          description: Created sale
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaleWithItems"
  /products/barcode/{barcode}:
    get:
      operationId: getProductByBarcode
      tags: [products]
      summary: Find product by barcode
      parameters:
        - name: barcode
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Found product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFound"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]
    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        brand:
          type: string
        costPrice:
          type: number
        salePrice:
          type: number
        quantity:
          type: integer
        barcode:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, name, brand, costPrice, salePrice, quantity, createdAt]
    CreateProduct:
      type: object
      properties:
        name:
          type: string
        brand:
          type: string
        costPrice:
          type: number
        salePrice:
          type: number
        quantity:
          type: integer
        barcode:
          type: string
          nullable: true
      required: [name, brand, costPrice, salePrice, quantity]
    DashboardStats:
      type: object
      properties:
        totalProducts:
          type: integer
        totalItems:
          type: integer
        totalCostValue:
          type: number
        totalSaleValue:
          type: number
        lowStockCount:
          type: integer
        todaySales:
          type: number
        todayTransactions:
          type: integer
      required: [totalProducts, totalItems, totalCostValue, totalSaleValue, lowStockCount, todaySales, todayTransactions]
    SaleItem:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
          nullable: true
        productName:
          type: string
        brand:
          type: string
        unitPrice:
          type: number
        quantity:
          type: integer
        totalPrice:
          type: number
      required: [id, productName, brand, unitPrice, quantity, totalPrice]
    SaleWithItems:
      type: object
      properties:
        id:
          type: integer
        totalAmount:
          type: number
        itemCount:
          type: integer
        note:
          type: string
          nullable: true
        createdAt:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/SaleItem"
      required: [id, totalAmount, itemCount, createdAt, items]
    CreateSaleItem:
      type: object
      properties:
        productId:
          type: integer
        quantity:
          type: integer
      required: [productId, quantity]
    CreateSale:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CreateSaleItem"
          minItems: 1
        note:
          type: string
          nullable: true
      required: [items]
    NotFound:
      type: object
      properties:
        error:
          type: string
      required: [error]
