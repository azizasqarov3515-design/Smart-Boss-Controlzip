openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification for SMARTBOSScontrol
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: products
  - name: dashboard
  - name: sales
  - name: customers
  - name: workers
  - name: deleteRequests
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /products:
    get:
      operationId: getProducts
      tags: [products]
      summary: Get all products
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProduct"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
  /products/{id}:
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProduct"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Dashboard statistics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"
  /sales:
    get:
      operationId: getSales
      tags: [sales]
      summary: Get all sales (transaction history)
      responses:
        "200":
          description: List of sales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SaleWithItems"
    post:
      operationId: createSale
      tags: [sales]
      summary: Create a sale (checkout cart, decrement stock)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSale"
      responses:
        "201":
          description: Created sale
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaleWithItems"
  /sales/{id}:
    delete:
      operationId: deleteSale
      tags: [sales]
      summary: Delete a single sale by ID (restores stock and debt)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required: [success]
  /sales/bulk-delete:
    post:
      operationId: bulkDeleteSales
      tags: [sales]
      summary: Delete multiple sales by IDs or delete all
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkDeleteSales"
      responses:
        "200":
          description: Deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                required: [deleted]
  /products/barcode/{barcode}:
    get:
      operationId: getProductByBarcode
      tags: [products]
      summary: Find product by barcode
      parameters:
        - name: barcode
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Found product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFound"
  /customers:
    get:
      operationId: getCustomers
      tags: [customers]
      summary: Get all customers
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomer"
      responses:
        "201":
          description: Created customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get a customer by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFound"
    put:
      operationId: updateCustomer
      tags: [customers]
      summary: Update a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomer"
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
  /customers/{id}/payments:
    get:
      operationId: getCustomerPayments
      tags: [customers]
      summary: Get debt payment history for a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DebtPayment"
    post:
      operationId: createCustomerPayment
      tags: [customers]
      summary: Record a debt payment for a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDebtPayment"
      responses:
        "201":
          description: Created payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebtPayment"
  /customers/{id}/statement:
    get:
      operationId: getCustomerStatement
      tags: [customers]
      summary: Get full debt statement for a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer debt statement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerStatement"
  /workers:
    get:
      operationId: getWorkers
      tags: [workers]
      summary: Get all workers (manager only)
      responses:
        "200":
          description: List of workers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Worker"
  /workers/{id}/approve:
    post:
      operationId: approveWorker
      tags: [workers]
      summary: Approve a worker registration (manager only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Worker approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Worker"
  /workers/{id}/reject:
    post:
      operationId: rejectWorker
      tags: [workers]
      summary: Reject a worker registration (manager only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Worker rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Worker"
  /workers/{id}:
    delete:
      operationId: removeWorker
      tags: [workers]
      summary: Remove worker from app (manager only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Worker removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required: [ok]
  /delete-requests:
    get:
      operationId: getDeleteRequests
      tags: [deleteRequests]
      summary: Get pending delete requests (manager only)
      responses:
        "200":
          description: List of delete requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeleteRequest"
    post:
      operationId: createDeleteRequest
      tags: [deleteRequests]
      summary: Create a delete request (worker)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDeleteRequest"
      responses:
        "201":
          description: Delete request created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  status:
                    type: string
                required: [id, status]
  /delete-requests/product:
    post:
      operationId: createProductDeleteRequest
      tags: [deleteRequests]
      summary: Create a product delete request (worker)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductDeleteRequest"
      responses:
        "201":
          description: Product delete request created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  status:
                    type: string
                required: [id, status]
  /delete-requests/{id}/approve:
    post:
      operationId: approveDeleteRequest
      tags: [deleteRequests]
      summary: Approve delete request (manager)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required: [ok]
  /delete-requests/{id}/reject:
    post:
      operationId: rejectDeleteRequest
      tags: [deleteRequests]
      summary: Reject delete request (manager)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required: [ok]
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]
    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        brand:
          type: string
        costPrice:
          type: number
        salePrice:
          type: number
        quantity:
          type: integer
        barcode:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, name, brand, costPrice, salePrice, quantity, createdAt]
    CreateProduct:
      type: object
      properties:
        name:
          type: string
        brand:
          type: string
        costPrice:
          type: number
        salePrice:
          type: number
        quantity:
          type: integer
        barcode:
          type: string
          nullable: true
      required: [name, brand, costPrice, salePrice, quantity]
    DashboardStats:
      type: object
      properties:
        totalProducts:
          type: integer
        totalItems:
          type: integer
        totalCostValue:
          type: number
        totalSaleValue:
          type: number
        lowStockCount:
          type: integer
        todaySales:
          type: number
        todayTransactions:
          type: integer
        totalDebt:
          type: number
        todayNetProfit:
          type: number
      required: [totalProducts, totalItems, totalCostValue, totalSaleValue, lowStockCount, todaySales, todayTransactions, totalDebt, todayNetProfit]
    Worker:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        address:
          type: string
        phone:
          type: string
        status:
          type: string
        createdAt:
          type: string
      required: [id, name, address, phone, status, createdAt]
    WorkerRegister:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        phone:
          type: string
        password:
          type: string
      required: [name, address, phone, password]
    WorkerRegisterResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        status:
          type: string
      required: [id, name, status]
    WorkerLogin:
      type: object
      properties:
        phone:
          type: string
        password:
          type: string
      required: [phone, password]
    WorkerLoginResponse:
      type: object
      properties:
        token:
          type: string
        workerId:
          type: integer
        name:
          type: string
        status:
          type: string
        role:
          type: string
      required: [token, workerId, name, status, role]
    DeleteRequest:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        saleIds:
          type: array
          items:
            type: integer
        productIds:
          type: array
          items:
            type: integer
          nullable: true
        productNames:
          type: array
          items:
            type: string
          nullable: true
        workerId:
          type: integer
          nullable: true
        workerName:
          type: string
        status:
          type: string
        createdAt:
          type: string
      required: [id, type, saleIds, workerName, status, createdAt]
    CreateDeleteRequest:
      type: object
      properties:
        saleIds:
          type: array
          items:
            type: integer
          minItems: 1
      required: [saleIds]
    CreateProductDeleteRequest:
      type: object
      properties:
        productIds:
          type: array
          items:
            type: integer
          minItems: 1
        productNames:
          type: array
          items:
            type: string
      required: [productIds, productNames]
    SaleItem:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
          nullable: true
        productName:
          type: string
        brand:
          type: string
        unitPrice:
          type: number
        quantity:
          type: integer
        totalPrice:
          type: number
      required: [id, productName, brand, unitPrice, quantity, totalPrice]
    SaleWithItems:
      type: object
      properties:
        id:
          type: integer
        totalAmount:
          type: number
        itemCount:
          type: integer
        note:
          type: string
          nullable: true
        paymentType:
          type: string
        customerId:
          type: integer
          nullable: true
        customerName:
          type: string
          nullable: true
        paidAmount:
          type: number
          nullable: true
        debtAmount:
          type: number
          nullable: true
        createdAt:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/SaleItem"
      required: [id, totalAmount, itemCount, createdAt, items, paymentType]
    CreateSaleItem:
      type: object
      properties:
        productId:
          type: integer
        quantity:
          type: integer
      required: [productId, quantity]
    CreateSale:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CreateSaleItem"
          minItems: 1
        note:
          type: string
          nullable: true
        paymentType:
          type: string
          enum: [cash, card, debt]
        customerId:
          type: integer
          nullable: true
        paidAmount:
          type: number
          nullable: true
      required: [items]
    BulkDeleteSales:
      type: object
      properties:
        ids:
          type: array
          items:
            type: integer
          nullable: true
        deleteAll:
          type: boolean
          nullable: true
      required: []
    Customer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        address:
          type: string
          nullable: true
        debtLimit:
          type: number
        totalDebt:
          type: number
        note:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, name, phone, debtLimit, totalDebt, createdAt]
    CreateCustomer:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        address:
          type: string
          nullable: true
        debtLimit:
          type: number
        note:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
      required: [name, phone]
    DebtPayment:
      type: object
      properties:
        id:
          type: integer
        customerId:
          type: integer
        amount:
          type: number
        note:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, customerId, amount, createdAt]
    CreateDebtPayment:
      type: object
      properties:
        amount:
          type: number
        note:
          type: string
          nullable: true
      required: [amount]
    StatementSale:
      type: object
      properties:
        id:
          type: integer
        totalAmount:
          type: number
        itemCount:
          type: integer
        paymentType:
          type: string
        paidAmount:
          type: number
          nullable: true
        debtAmount:
          type: number
          nullable: true
        createdAt:
          type: string
      required: [id, totalAmount, itemCount, paymentType, createdAt]
    StatementPayment:
      type: object
      properties:
        id:
          type: integer
        amount:
          type: number
        note:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, amount, createdAt]
    CustomerStatement:
      type: object
      properties:
        customer:
          $ref: "#/components/schemas/Customer"
        sales:
          type: array
          items:
            $ref: "#/components/schemas/StatementSale"
        payments:
          type: array
          items:
            $ref: "#/components/schemas/StatementPayment"
      required: [customer, sales, payments]
    NotFound:
      type: object
      properties:
        error:
          type: string
      required: [error]
