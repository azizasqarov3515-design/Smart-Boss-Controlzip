openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification for SMARTBOSScontrol
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: products
  - name: dashboard
  - name: sales
  - name: customers
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /products:
    get:
      operationId: getProducts
      tags: [products]
      summary: Get all products
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProduct"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
  /products/{id}:
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProduct"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Dashboard statistics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"
  /sales:
    get:
      operationId: getSales
      tags: [sales]
      summary: Get all sales (transaction history)
      responses:
        "200":
          description: List of sales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SaleWithItems"
    post:
      operationId: createSale
      tags: [sales]
      summary: Create a sale (checkout cart, decrement stock)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSale"
      responses:
        "201":
          description: Created sale
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaleWithItems"
  /products/barcode/{barcode}:
    get:
      operationId: getProductByBarcode
      tags: [products]
      summary: Find product by barcode
      parameters:
        - name: barcode
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Found product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFound"
  /customers:
    get:
      operationId: getCustomers
      tags: [customers]
      summary: Get all customers
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomer"
      responses:
        "201":
          description: Created customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get a customer by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFound"
    put:
      operationId: updateCustomer
      tags: [customers]
      summary: Update a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomer"
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
  /customers/{id}/payments:
    get:
      operationId: getCustomerPayments
      tags: [customers]
      summary: Get debt payment history for a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DebtPayment"
    post:
      operationId: createCustomerPayment
      tags: [customers]
      summary: Record a debt payment for a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDebtPayment"
      responses:
        "201":
          description: Created payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebtPayment"
  /customers/{id}/statement:
    get:
      operationId: getCustomerStatement
      tags: [customers]
      summary: Get full debt statement for a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer debt statement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerStatement"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]
    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        brand:
          type: string
        costPrice:
          type: number
        salePrice:
          type: number
        quantity:
          type: integer
        barcode:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, name, brand, costPrice, salePrice, quantity, createdAt]
    CreateProduct:
      type: object
      properties:
        name:
          type: string
        brand:
          type: string
        costPrice:
          type: number
        salePrice:
          type: number
        quantity:
          type: integer
        barcode:
          type: string
          nullable: true
      required: [name, brand, costPrice, salePrice, quantity]
    DashboardStats:
      type: object
      properties:
        totalProducts:
          type: integer
        totalItems:
          type: integer
        totalCostValue:
          type: number
        totalSaleValue:
          type: number
        lowStockCount:
          type: integer
        todaySales:
          type: number
        todayTransactions:
          type: integer
        totalDebt:
          type: number
      required: [totalProducts, totalItems, totalCostValue, totalSaleValue, lowStockCount, todaySales, todayTransactions, totalDebt]
    SaleItem:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
          nullable: true
        productName:
          type: string
        brand:
          type: string
        unitPrice:
          type: number
        quantity:
          type: integer
        totalPrice:
          type: number
      required: [id, productName, brand, unitPrice, quantity, totalPrice]
    SaleWithItems:
      type: object
      properties:
        id:
          type: integer
        totalAmount:
          type: number
        itemCount:
          type: integer
        note:
          type: string
          nullable: true
        paymentType:
          type: string
        customerId:
          type: integer
          nullable: true
        customerName:
          type: string
          nullable: true
        paidAmount:
          type: number
          nullable: true
        debtAmount:
          type: number
          nullable: true
        createdAt:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/SaleItem"
      required: [id, totalAmount, itemCount, createdAt, items, paymentType]
    CreateSaleItem:
      type: object
      properties:
        productId:
          type: integer
        quantity:
          type: integer
      required: [productId, quantity]
    CreateSale:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CreateSaleItem"
          minItems: 1
        note:
          type: string
          nullable: true
        paymentType:
          type: string
          enum: [cash, card, debt]
        customerId:
          type: integer
          nullable: true
        paidAmount:
          type: number
          nullable: true
      required: [items]
    Customer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        debtLimit:
          type: number
        totalDebt:
          type: number
        note:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, name, phone, debtLimit, totalDebt, createdAt]
    CreateCustomer:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        debtLimit:
          type: number
        note:
          type: string
          nullable: true
      required: [name, phone]
    DebtPayment:
      type: object
      properties:
        id:
          type: integer
        customerId:
          type: integer
        amount:
          type: number
        note:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, customerId, amount, createdAt]
    CreateDebtPayment:
      type: object
      properties:
        amount:
          type: number
        note:
          type: string
          nullable: true
      required: [amount]
    StatementSale:
      type: object
      properties:
        id:
          type: integer
        totalAmount:
          type: number
        itemCount:
          type: integer
        paymentType:
          type: string
        paidAmount:
          type: number
          nullable: true
        debtAmount:
          type: number
          nullable: true
        createdAt:
          type: string
      required: [id, totalAmount, itemCount, paymentType, createdAt]
    StatementPayment:
      type: object
      properties:
        id:
          type: integer
        amount:
          type: number
        note:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, amount, createdAt]
    CustomerStatement:
      type: object
      properties:
        customer:
          $ref: "#/components/schemas/Customer"
        sales:
          type: array
          items:
            $ref: "#/components/schemas/StatementSale"
        payments:
          type: array
          items:
            $ref: "#/components/schemas/StatementPayment"
      required: [customer, sales, payments]
    NotFound:
      type: object
      properties:
        error:
          type: string
      required: [error]
